<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Extractos</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#09080a;--paper:#edeade;--paper2:#e8e3d8}
html,body{width:100%;height:100%;overflow:hidden;background:var(--black);
  font-family:'IBM Plex Mono',monospace;-webkit-user-select:none;user-select:none;touch-action:none}

/* grain overlay */
body::after{content:’’;position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.28;mix-blend-mode:screen;
background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 200 200’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.85’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.05’/%3E%3C/svg%3E”)}

/* ── INTRO ── */
#intro{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
z-index:600;background:var(–black);transition:opacity .9s,visibility .9s}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none}
.i-ey{font-size:8px;font-weight:300;letter-spacing:6px;text-transform:uppercase;color:#3a3a3a;
opacity:0;animation:up .7s .4s forwards}
.i-title{font-family:‘EB Garamond’,serif;font-size:clamp(60px,10vw,110px);font-weight:400;font-style:italic;
color:#edeade;line-height:1;margin:12px 0 4px;letter-spacing:-2px;opacity:0;animation:up .8s .7s forwards}
.i-rule{width:0;height:.5px;background:#2a2a2a;margin:24px auto;animation:widen .5s 1.1s forwards}
.i-sub{font-size:8px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:#333;
opacity:0;animation:up .6s 1.3s forwards}
#btn-open{margin-top:48px;font-size:8px;letter-spacing:5px;text-transform:uppercase;
color:var(–black);background:#edeade;border:none;cursor:pointer;padding:13px 40px;
opacity:0;animation:up .6s 1.7s forwards;transition:background .2s,transform .15s}
#btn-open:hover{background:#ddd9d0;transform:translateY(-1px)}
#btn-open:active{transform:translateY(1px)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes widen{from{width:0}to{width:56px}}

/* ── STAGE ── */
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
opacity:0;visibility:hidden;transition:opacity .8s .1s,visibility .8s .1s}
#stage.on{opacity:1;visibility:visible}

/* ── BOOK WRAP ── */
#book-wrap{position:relative;will-change:transform;transition:width .55s cubic-bezier(.4,0,.2,1)}

/* Static pages rendered in DOM */
#pg-left,#pg-right{position:absolute;top:0;overflow:hidden;background:var(–paper)}
#pg-left{left:0;border-radius:2px 0 0 2px}
#pg-right{right:0;border-radius:0 2px 2px 0}

/* Canvas sits on top for flip anim */
#flip-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:10}

/* Spine */
#spine{position:absolute;top:0;z-index:20;pointer-events:none}

/* Click zones */
#hot-right,#hot-left{position:absolute;top:0;z-index:30}
#hot-right{right:0;cursor:e-resize}
#hot-left{left:0;cursor:w-resize}

/* ── PAGE CONTENT STYLES ── */
.pi{position:relative;width:100%;height:100%;background:var(–paper);overflow:hidden}
.pi img.full{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.pi .ov{position:absolute;inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,0) 50%,rgba(0,0,0,.60) 100%);z-index:2}
.lbl-a,.lbl-b{position:absolute;bottom:44px;font-size:7.5px;font-weight:300;
letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.88);z-index:3}
.lbl-a{left:26px}.lbl-b{right:26px}
.lbl-n{position:absolute;bottom:26px;font-size:7px;font-weight:300;
letter-spacing:2px;color:rgba(255,255,255,.35);z-index:3}
.lbl-n.l{left:26px}.lbl-n.r{right:26px}
.pi.no-img .lbl-a,.pi.no-img .lbl-b{color:#444}
.pi.no-img .lbl-n{color:#bbb}
.pi.no-img::before{content:’’;position:absolute;inset:0;
background-image:repeating-linear-gradient(to bottom,transparent,transparent 27px,rgba(0,0,0,.035) 27px,rgba(0,0,0,.035) 28px)}
.pi .strip{position:absolute;top:50%;transform:translateY(-50%);left:10%;right:10%;height:30%;
border-top:.5px dashed #d0ccc3;border-bottom:.5px dashed #d0ccc3;
display:flex;align-items:center;justify-content:center;z-index:1}
.pi .strip span{font-size:7px;letter-spacing:4px;color:#ccc;text-transform:uppercase}

/* ── COVER ── */
.cov{position:relative;width:100%;height:100%;overflow:hidden}
.cov img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.cov .ov2{position:absolute;inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.25) 0%,rgba(0,0,0,.04) 38%,rgba(0,0,0,.04) 60%,rgba(0,0,0,.42) 100%);z-index:1}
.cov .frame{position:absolute;inset:18px;border:.5px solid rgba(237,234,222,.20);z-index:2}
.cov .txt{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center}
.c-ey{font-size:7.5px;font-weight:300;letter-spacing:5px;text-transform:uppercase;
color:rgba(237,234,222,.50);margin-bottom:16px}
.c-t{font-family:‘EB Garamond’,serif;font-weight:400;font-style:italic;font-size:clamp(36px,7.5vw,62px);
color:rgba(237,234,222,.93);text-shadow:0 2px 24px rgba(0,0,0,.55);line-height:1;letter-spacing:-1px}
.c-r{width:28px;height:.5px;background:rgba(237,234,222,.28);margin:16px auto}
.c-s{font-size:7px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:rgba(237,234,222,.32)}
.c-yr{position:absolute;bottom:30px;right:30px;font-size:7px;letter-spacing:2px;color:rgba(237,234,222,.25);z-index:3}

/* ── BACK COVER ── */
.bcov{width:100%;height:100%;background:var(–paper);display:flex;align-items:center;justify-content:center;
position:relative;overflow:hidden}
.bcov::before{content:’’;position:absolute;inset:20px;border:.5px solid #d0ccc3;z-index:1}
.bcov::after{content:’’;position:absolute;inset:0;
background-image:repeating-linear-gradient(to bottom,transparent,transparent 27px,rgba(0,0,0,.03) 27px,rgba(0,0,0,.03) 28px)}
.bcov span{font-family:‘EB Garamond’,serif;font-style:italic;font-size:22px;color:#ccc;letter-spacing:6px;z-index:2;position:relative}

/* ── NAV ── */
#nav{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
display:flex;align-items:center;gap:24px;z-index:300;
opacity:0;visibility:hidden;transition:opacity .5s .4s,visibility .5s .4s}
#nav.on{opacity:1;visibility:visible}
.nb{width:36px;height:36px;background:none;border:.5px solid #222;color:#444;cursor:pointer;
display:flex;align-items:center;justify-content:center;font-size:14px;
transition:border-color .2s,color .2s,transform .1s;-webkit-tap-highlight-color:transparent}
.nb:hover:not(:disabled){border-color:#555;color:#aaa;transform:scale(1.06)}
.nb:active:not(:disabled){transform:scale(0.92)}
.nb:disabled{opacity:.1;cursor:not-allowed}
#ctr{font-size:7px;letter-spacing:3px;color:#2a2a2a;min-width:72px;text-align:center;text-transform:uppercase}
#btn-close{position:fixed;top:24px;right:26px;font-size:7px;letter-spacing:4px;
text-transform:uppercase;color:#222;background:none;border:none;cursor:pointer;
z-index:300;opacity:0;visibility:hidden;transition:opacity .4s .4s,visibility .4s .4s,color .2s;
-webkit-tap-highlight-color:transparent;padding:8px}
#btn-close.on{opacity:1;visibility:visible}
#btn-close:hover{color:#777}
#kh{position:fixed;top:28px;left:50%;transform:translateX(-50%);font-size:6.5px;letter-spacing:3px;
color:#1e1e1e;text-transform:uppercase;white-space:nowrap;z-index:300;
opacity:0;visibility:hidden;transition:opacity .4s .6s,visibility .4s .6s}
#kh.on{opacity:1;visibility:visible}

@media(max-width:680px){#kh{display:none}}
</style>

</head>
<body>

<div id="intro">
  <p class="i-ey">Edición I · 2025</p>
  <h1 class="i-title">Extractos</h1>
  <div class="i-rule"></div>
  <p class="i-sub">Una colección visual</p>
  <button id="btn-open">Abrir</button>
</div>

<div id="stage">
  <div id="book-wrap">
    <div id="pg-left"></div>
    <div id="pg-right"></div>
    <canvas id="flip-canvas"></canvas>
    <div id="spine"></div>
    <div id="hot-right"></div>
    <div id="hot-left"></div>
  </div>
</div>

<div id="nav">
  <button class="nb" id="bp" disabled>←</button>
  <span id="ctr">portada</span>
  <button class="nb" id="bn">→</button>
</div>
<button id="btn-close">✕ &nbsp;salir</button>
<div id="kh">← → navegar · esc cerrar</div>

<script>
(function () {

/* ══════════════════════════════════════════
   TUS IMÁGENES
   ══════════════════════════════════════════ */
var IMGS = [
  { src:'https://raw.githubusercontent.com/edsoncanaled/extractos/main/img/ejemplo2.JPG', a:'DÍAS',  b:'POR DELANTE' },
  { src:'https://raw.githubusercontent.com/edsoncanaled/extractos/main/img/ejemplo3.png', a:'LUZ',   b:'OBLICUA'     },
];

var LABELS = [
  {a:'DÍAS',b:'POR DELANTE'},{a:'LUZ',b:'OBLICUA'},{a:'VIENTO',b:'SUR'},
  {a:'MARZO',b:'TARDE'},{a:'SILENCIO',b:'FORMA'},{a:'ARENA',b:'BLANCA'},
  {a:'SOMBRA',b:'LARGA'},{a:'RÍO',b:'ABAJO'},{a:'TIERRA',b:'ADENTRO'},
  {a:'NOCHE',b:'ABIERTA'},{a:'CAMPO',b:'VACÍO'},{a:'AGUA',b:'QUIETA'},
  {a:'PIEDRA',b:'GRIS'},{a:'CIELO',b:'BAJO'},{a:'FIN',b:'DE SERIE'},
];

var N      = 15;                          // total content pages
var FTOTAL = Math.ceil((N + 1) / 2);     // total spreads after cover
var FLIPMS = 900;

/* ═══════════════════════════════════════════
   SIZING
   ═══════════════════════════════════════════ */
var mob = function(){ return window.innerWidth <= 680; };
var PW, PH, DPR;

function calcSize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  var vw = window.innerWidth, vh = window.innerHeight;
  if (mob()) {
    PH = Math.round(vh * 0.78);
    PW = Math.min(Math.round(PH * 0.70), Math.round(vw * 0.86));
  } else {
    PH = Math.min(Math.round(vh * 0.82), 720);
    PW = Math.min(Math.round(PH * 0.70), Math.round(vw * 0.40), 500);
  }
}
calcSize();

/* ═══════════════════════════════════════════
   ELEMENTS
   ═══════════════════════════════════════════ */
var wrap   = document.getElementById('book-wrap');
var pgL    = document.getElementById('pg-left');
var pgR    = document.getElementById('pg-right');
var fc     = document.getElementById('flip-canvas');
var spineEl= document.getElementById('spine');
var hotR   = document.getElementById('hot-right');
var hotL   = document.getElementById('hot-left');
var ctx    = fc.getContext('2d');

/* ═══════════════════════════════════════════
   STATE  (0 = cover single-page mode)
   ═══════════════════════════════════════════ */
var cur         = 0;   // spread index: 0=cover, 1..FTOTAL=spreads, FTOTAL+1=back
var coverOpen   = false; // has the book been opened at least once?

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
function bookWidth() {
  // At cover (cur===0, not open yet) show single page width; otherwise double
  return (cur === 0 && !coverOpen && !flipping) ? PW : PW * 2;
}

function layoutBook(animate) {
  var m  = mob();
  var bw = bookWidth();

  if (animate) {
    wrap.style.transition = 'width .55s cubic-bezier(.4,0,.2,1)';
  } else {
    wrap.style.transition = 'none';
  }

  wrap.style.width    = bw + 'px';
  wrap.style.height   = PH + 'px';
  wrap.style.position = 'relative';
  wrap.style.transform= m
    ? 'perspective(1800px) rotateX(2deg)'
    : 'perspective(3200px) rotateX(2.5deg) rotateY(-0.5deg)';
  wrap.style.filter   = 'drop-shadow(0 '+(m?50:80)+'px '+(m?100:140)+'px rgba(0,0,0,.95)) drop-shadow(0 '+(m?14:22)+'px '+(m?30:50)+'px rgba(0,0,0,.65))';

  /* Left page — hidden on mobile or when showing single cover */
  var showLeft = !m && (cur > 0 || coverOpen || flipping);
  pgL.style.display  = showLeft ? 'block' : 'none';
  pgL.style.width    = PW + 'px';
  pgL.style.height   = PH + 'px';
  pgL.style.left     = '0';
  pgL.style.position = 'absolute';
  pgL.style.top      = '0';

  /* Right page */
  pgR.style.width    = PW + 'px';
  pgR.style.height   = PH + 'px';
  pgR.style.right    = '0';
  pgR.style.position = 'absolute';
  pgR.style.top      = '0';

  /* Canvas — full book width */
  fc.width           = Math.round(bw * DPR);
  fc.height          = Math.round(PH * DPR);
  fc.style.width     = bw + 'px';
  fc.style.height    = PH + 'px';
  fc.style.position  = 'absolute';
  fc.style.top       = '0';
  fc.style.left      = '0';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  /* Spine */
  var sw = (m || !showLeft) ? 0 : 16;
  spineEl.style.position  = 'absolute';
  spineEl.style.top       = '0';
  spineEl.style.left      = (showLeft ? PW - sw/2 : -200) + 'px';
  spineEl.style.width     = sw + 'px';
  spineEl.style.height    = PH + 'px';
  spineEl.style.zIndex    = '20';
  spineEl.style.pointerEvents = 'none';
  spineEl.style.background = sw > 0
    ? 'linear-gradient(to right,rgba(0,0,0,.18) 0%,rgba(0,0,0,.62) 30%,rgba(0,0,0,.76) 50%,rgba(0,0,0,.60) 70%,rgba(0,0,0,.18) 100%)'
    : 'none';

  /* Hot zones */
  hotR.style.width    = PW + 'px';
  hotR.style.height   = PH + 'px';
  hotR.style.right    = '0';
  hotR.style.position = 'absolute';
  hotR.style.top      = '0';
  hotR.style.zIndex   = '30';

  hotL.style.width    = showLeft ? PW + 'px' : '0';
  hotL.style.height   = PH + 'px';
  hotL.style.left     = '0';
  hotL.style.position = 'absolute';
  hotL.style.top      = '0';
  hotL.style.zIndex   = '30';
}
layoutBook(false);

/* ═══════════════════════════════════════════
   PAGE HTML (DOM pages)
   ═══════════════════════════════════════════ */
function makeHTML(idx) {
  idx = Math.max(0, Math.min(idx, N + 1));
  if (idx === 0) return coverHTML();
  if (idx > N)   return bcovHTML();
  var d   = IMGS[idx - 1] || null;
  var lbl = LABELS[idx - 1] || {a:'—',b:'—'};
  var n   = ('0' + idx).slice(-2);
  var a   = (d && d.a) || lbl.a;
  var b   = (d && d.b) || lbl.b;
  var isL = idx % 2 === 1;
  if (d && d.src) {
    return '<div class="pi">'
      + '<img class="full" src="' + d.src + '" alt="' + a + '" loading="lazy" decoding="async">'
      + '<div class="ov"></div>'
      + '<span class="lbl-a">' + a + '</span>'
      + '<span class="lbl-b">' + b + '</span>'
      + '<span class="lbl-n ' + (isL?'l':'r') + '">' + n + '</span>'
      + '</div>';
  }
  return '<div class="pi no-img">'
    + '<div class="strip"><span>imagen ' + n + '</span></div>'
    + '<span class="lbl-a">' + a + '</span>'
    + '<span class="lbl-b">' + b + '</span>'
    + '<span class="lbl-n ' + (isL?'l':'r') + '">' + n + '</span>'
    + '</div>';
}

function coverHTML() {
  var s = IMGS[0] ? IMGS[0].src : null;
  return '<div class="cov">'
    + (s ? '<img src="' + s + '" alt="portada" loading="eager" decoding="async">' : '<div style="position:absolute;inset:0;background:#b0aca3"></div>')
    + '<div class="ov2"></div><div class="frame"></div>'
    + '<div class="txt">'
    + '<p class="c-ey">Edición I · 2025</p>'
    + '<h2 class="c-t">Extractos</h2>'
    + '<div class="c-r"></div>'
    + '<p class="c-s">Colección Visual</p>'
    + '</div>'
    + '<span class="c-yr">© 2025</span>'
    + '</div>';
}

function bcovHTML() {
  return '<div class="bcov"><span>extractos</span></div>';
}

function setPage(el, idx) { el.innerHTML = makeHTML(idx); }

function refreshStatic() {
  var m = mob();
  if (cur === 0) {
    if (!m) setPage(pgL, N + 1); // back cover behind (not visible at start)
    setPage(pgR, 0);
  } else if (cur >= FTOTAL) {
    if (!m) setPage(pgL, N);
    setPage(pgR, N + 1);
  } else {
    var li = (cur - 1) * 2 + 1;
    var ri = cur * 2;
    if (!m) setPage(pgL, Math.min(li, N + 1));
    setPage(pgR, Math.min(ri, N + 1));
  }
}

/* ═══════════════════════════════════════════
   OFF-SCREEN CANVAS (canvas-based page render)
   ═══════════════════════════════════════════ */
function buildOC(idx) {
  idx = Math.max(0, Math.min(idx, N + 1));
  var oc = document.createElement('canvas');
  oc.width  = Math.round(PW * DPR);
  oc.height = Math.round(PH * DPR);
  var c = oc.getContext('2d');
  c.setTransform(DPR, 0, 0, DPR, 0, 0);

  function lines() {
    c.strokeStyle = 'rgba(0,0,0,0.04)'; c.lineWidth = 0.5;
    for (var y = 40; y < PH; y += 28) {
      c.beginPath(); c.moveTo(0, y); c.lineTo(PW, y); c.stroke();
    }
  }

  if (idx === 0) {
    /* Cover */
    c.fillStyle = '#b5b0a6'; c.fillRect(0, 0, PW, PH);
    var ov = c.createLinearGradient(0, 0, 0, PH);
    ov.addColorStop(0,   'rgba(0,0,0,.22)');
    ov.addColorStop(.5,  'rgba(0,0,0,.04)');
    ov.addColorStop(1,   'rgba(0,0,0,.40)');
    c.fillStyle = ov; c.fillRect(0, 0, PW, PH);
    c.strokeStyle = 'rgba(237,234,222,.18)'; c.lineWidth = 0.6;
    c.strokeRect(18, 18, PW - 36, PH - 36);
    c.textAlign = 'center';
    c.font = '300 ' + Math.round(PW * .022) + 'px "IBM Plex Mono",monospace';
    c.fillStyle = 'rgba(237,234,222,.46)';
    c.fillText('EDICIÓN I  ·  2025', PW / 2, PH * .365);
    c.font = 'italic ' + Math.round(PW * .115) + 'px "EB Garamond",Georgia,serif';
    c.fillStyle = 'rgba(237,234,222,.92)';
    c.shadowColor = 'rgba(0,0,0,.5)'; c.shadowBlur = 20;
    c.fillText('Extractos', PW / 2, PH * .5);
    c.shadowBlur = 0;
    c.font = '300 ' + Math.round(PW * .020) + 'px "IBM Plex Mono",monospace';
    c.fillStyle = 'rgba(237,234,222,.30)';
    c.fillText('COLECCIÓN VISUAL', PW / 2, PH * .59);

  } else if (idx > N) {
    /* Back cover */
    c.fillStyle = '#edeade'; c.fillRect(0, 0, PW, PH); lines();
    c.strokeStyle = '#d0ccc3'; c.lineWidth = 0.6;
    c.strokeRect(20, 20, PW - 40, PH - 40);
    c.font = 'italic ' + Math.round(PW * .055) + 'px "EB Garamond",Georgia,serif';
    c.fillStyle = '#ccc'; c.textAlign = 'center';
    c.fillText('extractos', PW / 2, PH / 2 + 8);

  } else {
    /* Content page */
    var d   = IMGS[idx - 1] || null;
    var lbl = LABELS[idx - 1] || {a:'—',b:'—'};
    var n   = ('0' + idx).slice(-2);
    var a   = (d && d.a) || lbl.a;
    var b   = (d && d.b) || lbl.b;
    var isL = idx % 2 === 1;
    var hasImg = !!(d && d.src);

    c.fillStyle = hasImg ? '#8e8880' : '#edeade';
    c.fillRect(0, 0, PW, PH);

    if (!hasImg) {
      lines();
      var my = PH / 2, h = PH * .28;
      c.strokeStyle = '#d0ccc3'; c.lineWidth = 0.5;
      c.beginPath(); c.moveTo(PW*.1, my-h/2); c.lineTo(PW*.9, my-h/2); c.stroke();
      c.beginPath(); c.moveTo(PW*.1, my+h/2); c.lineTo(PW*.9, my+h/2); c.stroke();
      c.font = '300 ' + Math.round(PW*.022) + 'px "IBM Plex Mono",monospace';
      c.fillStyle = '#ccc'; c.textAlign = 'center';
      c.fillText('imagen ' + n, PW/2, my + 6);
    }

    var g = c.createLinearGradient(0, PH*.65, 0, PH);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(1, 'rgba(0,0,0,.52)');
    c.fillStyle = g; c.fillRect(0, 0, PW, PH);

    var col = hasImg ? 'rgba(255,255,255,.88)' : '#444';
    var dim = hasImg ? 'rgba(255,255,255,.35)' : '#bbb';
    c.font = '300 ' + Math.round(PW*.026) + 'px "IBM Plex Mono",monospace';
    c.fillStyle = col;
    c.textAlign = 'left';  c.fillText(a, 26, PH - 44);
    c.textAlign = 'right'; c.fillText(b, PW - 26, PH - 44);
    c.font = '300 ' + Math.round(PW*.021) + 'px "IBM Plex Mono",monospace';
    c.fillStyle = dim;
    if (isL) { c.textAlign = 'left';  c.fillText(n, 26,      PH - 26); }
    else      { c.textAlign = 'right'; c.fillText(n, PW - 26, PH - 26); }
  }
  return oc;
}

/* ═══════════════════════════════════════════
   DRAW FLIP FRAME
   fOC = front page canvas  (what's being turned FROM)
   bOC = back page canvas   (what's being turned TO, mirrored)
   t   = 0..1 progress
   openingCover = bool, book is expanding from single to double
   ═══════════════════════════════════════════ */
function clearFC(fullW) {
  var w = fullW || PW * 2;
  ctx.clearRect(0, 0, w, PH);
}

function drawFlip(t, fOC, bOC, openingCover) {
  var m       = mob();
  /* When opening the cover on desktop, the pivot is the LEFT edge of the right page
     (which starts at x=0 for single-page, expanding outward).
     For all other flips the pivot/spine is at x=PW (center of spread). */
  var SPINE   = openingCover ? 0 : (m ? 0 : PW);
  var bw      = openingCover ? PW * 2 : (m ? PW : PW * 2);

  ctx.clearRect(0, 0, bw, PH);

  var angle = t * Math.PI;
  var cosA  = Math.cos(angle);
  var sinA  = Math.abs(Math.sin(angle));

  /* foldX: x-position of the folding edge */
  var foldX;
  if (openingCover) {
    /* Cover flips from right-side (SPINE=0) to the left, expanding book */
    /* t=0: cover fully on right (foldX = PW), t=1: cover gone to left */
    foldX = SPINE + PW * Math.cos(angle); // goes from PW → 0 → -PW
  } else {
    foldX = SPINE + PW * cosA;
  }

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  /* ── FRONT FACE (first half of flip, t < 0.5) ── */
  if (t < 0.5 && fOC) {
    var clipX = openingCover ? 0 : SPINE;
    var clipW = openingCover ? PW : PW;
    var drawW = openingCover ? foldX - SPINE : foldX - SPINE;

    if (drawW > 1) {
      ctx.save();
      /* Clip to the right half of book (where cover page lives) */
      ctx.beginPath();
      ctx.rect(clipX, 0, clipW, PH);
      ctx.clip();
      /* Scale page horizontally to perspective compression */
      ctx.drawImage(fOC, 0, 0, fOC.width, fOC.height, SPINE, 0, drawW, PH);
      /* Shadow on right edge of flipping page */
      var sh = ctx.createLinearGradient(foldX - drawW * .5, 0, foldX, 0);
      sh.addColorStop(0, 'rgba(0,0,0,0)');
      sh.addColorStop(.6,'rgba(0,0,0,' + (.10 * sinA) + ')');
      sh.addColorStop(1, 'rgba(0,0,0,' + (.50 * sinA) + ')');
      ctx.fillStyle = sh;
      ctx.fillRect(SPINE, 0, drawW, PH);
      ctx.restore();
    }
  }

  /* ── BACK FACE (second half of flip, t > 0.5) ── */
  if (t > 0.5 && bOC) {
    var backRight, backW;
    if (openingCover) {
      /* Back face lands on the LEFT half (0..PW) */
      backRight = PW;
      backW = backRight - foldX; /* foldX is negative approaching from left */
      if (backW > 1 && foldX < backRight) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, PW, PH);
        ctx.clip();
        /* Mirror the back page (it's seen from behind) */
        ctx.save();
        ctx.translate(PW, 0);
        ctx.scale(-1, 1);
        var srcW = Math.min(backW, PW);
        ctx.drawImage(bOC, 0, 0, bOC.width, bOC.height, PW - backW, 0, srcW, PH);
        ctx.restore();
        /* Dark shadow near fold */
        var sh2 = ctx.createLinearGradient(Math.max(foldX, 0), 0, Math.max(foldX,0) + backW * .5, 0);
        sh2.addColorStop(0, 'rgba(0,0,0,' + (.40 * (1 - sinA)) + ')');
        sh2.addColorStop(.5,'rgba(0,0,0,' + (.12 * (1 - sinA)) + ')');
        sh2.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sh2;
        ctx.fillRect(Math.max(foldX,0), 0, backW, PH);
        ctx.restore();
      }
    } else {
      /* Normal flip: back face appears in the LEFT half */
      var w2 = SPINE - foldX;
      if (w2 > 1) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, SPINE, PH);
        ctx.clip();
        ctx.save();
        ctx.translate(SPINE, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(bOC, 0, 0, bOC.width, bOC.height, 0, 0, w2, PH);
        ctx.restore();
        var sh3 = ctx.createLinearGradient(foldX, 0, foldX + w2 * .55, 0);
        sh3.addColorStop(0, 'rgba(0,0,0,' + (.42 * (1 - sinA)) + ')');
        sh3.addColorStop(.5,'rgba(0,0,0,' + (.14 * (1 - sinA)) + ')');
        sh3.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sh3;
        ctx.fillRect(foldX, 0, w2, PH);
        ctx.restore();
      }
    }
  }

  /* ── FOLD CREASE ── */
  if (sinA > 0.03 && foldX > -PW * .5 && foldX < (openingCover ? PW*2.5 : bw + PW*.5)) {
    var cw = 16 * sinA;
    var dk = ctx.createLinearGradient(foldX - cw, 0, foldX, 0);
    dk.addColorStop(0, 'rgba(0,0,0,0)');
    dk.addColorStop(1, 'rgba(0,0,0,' + (.30 * sinA) + ')');
    ctx.fillStyle = dk;
    ctx.fillRect(foldX - cw, 0, cw, PH);

    var sp = ctx.createLinearGradient(foldX - 1.5, 0, foldX + 3.5, 0);
    sp.addColorStop(0,  'rgba(255,255,255,0)');
    sp.addColorStop(.3, 'rgba(255,255,255,' + (.40 * sinA) + ')');
    sp.addColorStop(.5, 'rgba(255,255,255,' + (.60 * sinA) + ')');
    sp.addColorStop(.7, 'rgba(0,0,0,' + (.20 * sinA) + ')');
    sp.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle = sp;
    ctx.fillRect(foldX - 1.5, 0, 5, PH);
  }

  /* ── CAST SHADOW on static pages ── */
  if (sinA > 0.02 && !m) {
    if (!openingCover) {
      if (t < 0.5) {
        var swL = PW * sinA * .52;
        var sl  = ctx.createLinearGradient(SPINE, 0, SPINE - swL, 0);
        sl.addColorStop(0, 'rgba(0,0,0,' + (.28 * sinA) + ')');
        sl.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sl;
        ctx.fillRect(SPINE - swL, 0, swL, PH);
      } else {
        var swR = PW * sinA * .42;
        var sr  = ctx.createLinearGradient(SPINE, 0, SPINE + swR, 0);
        sr.addColorStop(0, 'rgba(0,0,0,' + (.22 * sinA) + ')');
        sr.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sr;
        ctx.fillRect(SPINE, 0, swR, PH);
      }
    }
  }

  /* ── SPINE ── */
  if (!m && !openingCover) {
    var sg = ctx.createLinearGradient(SPINE - 8, 0, SPINE + 8, 0);
    sg.addColorStop(0,   'rgba(0,0,0,.20)');
    sg.addColorStop(.35, 'rgba(0,0,0,.62)');
    sg.addColorStop(.5,  'rgba(0,0,0,.74)');
    sg.addColorStop(.65, 'rgba(0,0,0,.56)');
    sg.addColorStop(1,   'rgba(0,0,0,.18)');
    ctx.fillStyle = sg;
    ctx.fillRect(SPINE - 8, 0, 16, PH);
    var ss = ctx.createLinearGradient(SPINE - 8, 0, SPINE - 3, 0);
    ss.addColorStop(0, 'rgba(255,255,255,.09)');
    ss.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = ss;
    ctx.fillRect(SPINE - 8, 0, 5, PH);
  }
}

/* ═══════════════════════════════════════════
   EASING
   ═══════════════════════════════════════════ */
function ease(t) {
  if (t < .18) return 3.0 * t * t;
  if (t < .72) return .097 + 1.19 * (t - .18);
  var s = (t - .72) / .28;
  return .74 + .26 * (1 - Math.pow(1 - s, 2.8));
}

/* ═══════════════════════════════════════════
   FLIP ENGINE
   ═══════════════════════════════════════════ */
var flipping    = false;
var flipDir     = 1;
var flipRAF     = null;
var flipStart   = null;
var fOC_g       = null;
var bOC_g       = null;
var openingCoverFlag = false;

function startFlip(dir, fi, bi, isOpeningCover) {
  if (flipping) return;
  flipping = true;
  flipDir  = dir;
  flipStart = null;
  openingCoverFlag = !!isOpeningCover;
  fOC_g = buildOC(fi);
  bOC_g = buildOC(bi);

  /* If opening the cover, expand the wrap width first via CSS transition */
  if (isOpeningCover) {
    coverOpen = true;
    layoutBook(true); // triggers CSS width transition
  }

  requestAnimationFrame(animFlip);
}

function animFlip(ts) {
  if (!flipStart) flipStart = ts;
  var raw  = Math.min((ts - flipStart) / FLIPMS, 1);
  var t    = ease(raw);
  var prog = flipDir === 1 ? t : 1 - t;
  drawFlip(prog, fOC_g, bOC_g, openingCoverFlag);

  if (raw < 1) {
    flipRAF = requestAnimationFrame(animFlip);
  } else {
    /* Done */
    flipping = false;
    flipStart = null;
    flipRAF   = null;
    openingCoverFlag = false;
    /* Resize canvas back to full width after cover flip */
    layoutBook(false);
    ctx.clearRect(0, 0, PW * 2, PH);
    refreshStatic();
    setNav();
  }
}

/* ═══════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════ */
function next() {
  if (flipping || cur >= FTOTAL) return;

  if (cur === 0) {
    /* Opening the cover: cover flips to reveal first spread */
    var fi = 0;              /* front = cover page */
    var bi = N + 1;          /* back-of-cover = first left page (back cover mirrored) */
    cur++;
    setNav();
    /* In single-to-double we need the canvas to be wide immediately */
    coverOpen = true;
    layoutBook(true);
    /* Small delay so CSS transition starts before RAF */
    setTimeout(function(){
      startFlip(1, fi, 1, true);
    }, 20);
  } else {
    var fi2 = Math.min(cur * 2, N + 1);
    var bi2 = Math.min(cur * 2 + 1, N + 1);
    cur++;
    setNav();
    startFlip(1, fi2, bi2, false);
  }
}

function prev() {
  if (flipping || cur <= 0) return;
  var fi = Math.min((cur - 1) * 2, N + 1);
  var bi = Math.min((cur - 1) * 2 + 1, N + 1);
  cur--;
  setNav();
  startFlip(-1, fi, bi, false);
}

function setNav() {
  document.getElementById('bp').disabled = cur <= 0;
  document.getElementById('bn').disabled = cur >= FTOTAL;
  var el = document.getElementById('ctr');
  if (cur === 0) { el.textContent = 'portada'; return; }
  if (cur >= FTOTAL) { el.textContent = 'fin'; return; }
  var l = cur * 2 - 1, r = cur * 2;
  el.textContent = ('0'+l).slice(-2) + ' · ' + (r <= N ? ('0'+r).slice(-2) : '—');
}

/* ═══════════════════════════════════════════
   OPEN / CLOSE BOOK
   ═══════════════════════════════════════════ */
function openBook() {
  document.getElementById('intro').classList.add('gone');
  ['stage','nav','btn-close','kh'].forEach(function(id){
    document.getElementById(id).classList.add('on');
  });
  cur = 0;
  coverOpen = false;
  layoutBook(false);
  refreshStatic();
  setNav();
  ctx.clearRect(0, 0, PW * 2, PH);
}

function closeBook() {
  if (flipRAF) { cancelAnimationFrame(flipRAF); flipRAF = null; }
  flipping = false; flipStart = null;
  ['stage','nav','btn-close','kh'].forEach(function(id){
    document.getElementById(id).classList.remove('on');
  });
  setTimeout(function(){
    cur = 0;
    coverOpen = false;
    layoutBook(false);
    ctx.clearRect(0, 0, PW * 2, PH);
    refreshStatic();
    setNav();
    document.getElementById('intro').classList.remove('gone');
  }, 650);
}

/* ═══════════════════════════════════════════
   EVENTS
   ═══════════════════════════════════════════ */
document.getElementById('btn-open').addEventListener('click', openBook);
document.getElementById('btn-close').addEventListener('click', closeBook);
document.getElementById('bp').addEventListener('click', prev);
document.getElementById('bn').addEventListener('click', next);
hotR.addEventListener('click', function(e){ e.stopPropagation(); next(); });
hotL.addEventListener('click', function(e){ e.stopPropagation(); prev(); });

document.addEventListener('keydown', function(e){
  if (e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); next(); }
  else if (e.key==='ArrowLeft'){ e.preventDefault(); prev(); }
  else if (e.key==='Escape') closeBook();
});

var tx=0, ty=0;
document.addEventListener('touchstart', function(e){
  tx=e.touches[0].clientX; ty=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend', function(e){
  var dx=e.changedTouches[0].clientX-tx;
  var dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>38) dx<0?next():prev();
},{passive:true});

window.addEventListener('resize', function(){
  calcSize(); layoutBook(false); ctx.clearRect(0,0,PW*2,PH); refreshStatic();
});

/* ── init ── */
refreshStatic(); setNav();

})();
</script>
