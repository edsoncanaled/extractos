<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Extractos</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#09080a;--paper:#edeade}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--black);
  font-family:'IBM Plex Mono',monospace;
  -webkit-user-select:none;user-select:none;
  touch-action:none;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  opacity:.20;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* INTRO */
#intro{
position:fixed;inset:0;
display:flex;flex-direction:column;align-items:center;justify-content:center;
z-index:800;background:var(–black);
transition:opacity .8s,visibility .8s;
}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none}
.i-ey{font-size:8px;font-weight:300;letter-spacing:6px;text-transform:uppercase;
color:#3a3a3a;opacity:0;animation:fadeUp .7s .3s forwards}
.i-title{
font-family:‘EB Garamond’,serif;font-size:clamp(56px,10vw,108px);font-style:italic;
color:#edeade;line-height:1;margin:10px 0 4px;letter-spacing:-2px;
opacity:0;animation:fadeUp .8s .6s forwards;
}
.i-rule{width:0;height:.5px;background:#252525;margin:22px auto;animation:widen .5s 1s forwards}
.i-sub{font-size:8px;font-weight:300;letter-spacing:5px;text-transform:uppercase;
color:#2e2e2e;opacity:0;animation:fadeUp .6s 1.2s forwards}
#btn-open{
margin-top:44px;font-size:8px;letter-spacing:5px;text-transform:uppercase;
color:var(–black);background:#edeade;border:none;cursor:pointer;padding:12px 38px;
opacity:0;animation:fadeUp .5s 1.6s forwards;transition:background .2s,transform .12s;
}
#btn-open:hover{background:#ddd9d0;transform:translateY(-1px)}
#btn-open:active{transform:translateY(1px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes widen{to{width:52px}}

/* STAGE */
#stage{
position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
opacity:0;visibility:hidden;transition:opacity .7s,visibility .7s;
}
#stage.on{opacity:1;visibility:visible}

/* BOOK — perspective container */
#book{
position:relative;
perspective:2200px;
transform-style:preserve-3d;
transform:rotateX(3deg);
filter:drop-shadow(0 60px 120px rgba(0,0,0,.95)) drop-shadow(0 18px 40px rgba(0,0,0,.6));
}

/* Static background pages */
.spage{
position:absolute;top:0;
overflow:hidden;background:var(–paper);
}
#sp-left {left:0; border-radius:2px 0 0 2px}
#sp-right{right:0;border-radius:0 2px 2px 0}

/* THE LEAF — rotates around its left edge */
#leaf{
position:absolute;top:0;
transform-origin:left center;
transform-style:preserve-3d;
z-index:20;
pointer-events:none;
display:none;
}
#leaf-front,#leaf-back{
position:absolute;inset:0;
overflow:hidden;
backface-visibility:hidden;
-webkit-backface-visibility:hidden;
}
#leaf-back{transform:rotateY(180deg)}
/* Mirror back so content reads correctly */
#leaf-back-inner{
width:100%;height:100%;
transform:scaleX(-1);
}

/* Realistic fold shadow on the leaf */
#leaf-front::after,#leaf-back::after{
content:’’;position:absolute;inset:0;pointer-events:none;z-index:10;
}
/* Right-edge shadow when closing (front face) */
#leaf-front::after{
background:linear-gradient(to left,rgba(0,0,0,.0) 65%,rgba(0,0,0,.28) 100%);
}
/* Left-edge shadow when opening (back face — already mirrored, so gradient also mirrors) */
#leaf-back::after{
background:linear-gradient(to left,rgba(0,0,0,.0) 65%,rgba(0,0,0,.20) 100%);
}

/* Spine */
#spine{
position:absolute;top:0;z-index:30;pointer-events:none;
background:linear-gradient(to right,
rgba(0,0,0,.12) 0%,rgba(0,0,0,.52) 30%,
rgba(0,0,0,.70) 50%,rgba(0,0,0,.48) 70%,rgba(0,0,0,.12) 100%);
}

/* Click zones */
#hz-right,#hz-left{position:absolute;top:0;z-index:50;cursor:pointer}
#hz-right{right:0} #hz-left{left:0}

/* PAGE CONTENT */
.pg{position:relative;width:100%;height:100%;overflow:hidden;background:var(–paper)}
.pg img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.pg .shade{
position:absolute;inset:0;z-index:2;
background:linear-gradient(to bottom,rgba(0,0,0,0) 55%,rgba(0,0,0,.62) 100%);
}
.pg .la,.pg .lb{
position:absolute;bottom:42px;z-index:3;
font-size:7.5px;font-weight:300;letter-spacing:3px;text-transform:uppercase;
color:rgba(255,255,255,.88);
}
.pg .la{left:24px} .pg .lb{right:24px}
.pg .ln{
position:absolute;bottom:24px;z-index:3;
font-size:7px;font-weight:300;letter-spacing:2px;color:rgba(255,255,255,.30);
}
.pg .ln.l{left:24px} .pg .ln.r{right:24px}
.pg.empty{background:var(–paper)}
.pg.empty::before{
content:’’;position:absolute;inset:0;
background-image:repeating-linear-gradient(to bottom,
transparent,transparent 27px,rgba(0,0,0,.032) 27px,rgba(0,0,0,.032) 28px);
}
.pg.empty .la,.pg.empty .lb{color:#3a3a3a}
.pg.empty .ln{color:#aaa}
.pg.empty .mid{
position:absolute;top:50%;left:10%;right:10%;transform:translateY(-50%);
border-top:.5px dashed #ccc8bf;border-bottom:.5px dashed #ccc8bf;
height:28%;display:flex;align-items:center;justify-content:center;
}
.pg.empty .mid span{font-size:7px;letter-spacing:4px;color:#c5c0b7;text-transform:uppercase}

/* COVER */
.cover{position:relative;width:100%;height:100%;overflow:hidden}
.cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.cover .veil{
position:absolute;inset:0;z-index:1;
background:linear-gradient(to bottom,rgba(0,0,0,.28) 0%,rgba(0,0,0,0) 38%,rgba(0,0,0,0) 60%,rgba(0,0,0,.44) 100%);
}
.cover .bdr{position:absolute;inset:16px;border:.5px solid rgba(237,234,222,.18);z-index:2}
.cover .info{
position:absolute;inset:0;z-index:3;
display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.cv-ey{font-size:7.5px;font-weight:300;letter-spacing:5px;text-transform:uppercase;
color:rgba(237,234,222,.44);margin-bottom:14px}
.cv-t{
font-family:‘EB Garamond’,serif;font-style:italic;font-size:clamp(32px,7vw,60px);
color:rgba(237,234,222,.93);text-shadow:0 2px 20px rgba(0,0,0,.5);
line-height:1;letter-spacing:-1px;
}
.cv-r{width:26px;height:.5px;background:rgba(237,234,222,.26);margin:14px auto}
.cv-s{font-size:7px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:rgba(237,234,222,.28)}
.cover .yr{position:absolute;bottom:28px;right:26px;z-index:3;
font-size:7px;letter-spacing:2px;color:rgba(237,234,222,.22)}

/* BACK COVER */
.bcov{
position:relative;width:100%;height:100%;background:var(–paper);
display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.bcov::before{content:’’;position:absolute;inset:18px;border:.5px solid #d0ccc3;z-index:1}
.bcov::after{
content:’’;position:absolute;inset:0;
background-image:repeating-linear-gradient(to bottom,
transparent,transparent 27px,rgba(0,0,0,.028) 27px,rgba(0,0,0,.028) 28px);
}
.bcov em{
font-family:‘EB Garamond’,serif;font-style:italic;
font-size:20px;color:#bbb;letter-spacing:6px;position:relative;z-index:2;
}

/* NAV */
#nav{
position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
display:flex;align-items:center;gap:20px;z-index:500;
opacity:0;visibility:hidden;transition:opacity .5s .3s,visibility .5s .3s;
}
#nav.on{opacity:1;visibility:visible}
.nb{
width:36px;height:36px;background:none;border:.5px solid #1e1e1e;color:#3a3a3a;
cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;
transition:border-color .18s,color .18s,transform .1s;-webkit-tap-highlight-color:transparent;
}
.nb:hover:not(:disabled){border-color:#444;color:#999;transform:scale(1.05)}
.nb:active:not(:disabled){transform:scale(.9)}
.nb:disabled{opacity:.08;cursor:not-allowed}
#ctr{font-size:7px;letter-spacing:3px;color:#282828;min-width:68px;text-align:center;text-transform:uppercase}
#btn-close{
position:fixed;top:22px;right:24px;font-size:7px;letter-spacing:4px;text-transform:uppercase;
color:#1e1e1e;background:none;border:none;cursor:pointer;z-index:500;padding:8px;
opacity:0;visibility:hidden;transition:opacity .4s .3s,visibility .4s .3s,color .2s;
-webkit-tap-highlight-color:transparent;
}
#btn-close.on{opacity:1;visibility:visible}
#btn-close:hover{color:#666}
#kh{
position:fixed;top:26px;left:50%;transform:translateX(-50%);
font-size:6.5px;letter-spacing:3px;color:#1c1c1c;text-transform:uppercase;
white-space:nowrap;z-index:500;opacity:0;visibility:hidden;
transition:opacity .4s .5s,visibility .4s .5s;
}
#kh.on{opacity:1;visibility:visible}
@media(max-width:680px){#kh{display:none}}
</style>

</head>
<body>

<div id="intro">
  <p class="i-ey">Edición I · 2025</p>
  <h1 class="i-title">Extractos</h1>
  <div class="i-rule"></div>
  <p class="i-sub">Una colección visual</p>
  <button id="btn-open">Abrir</button>
</div>

<div id="stage">
  <div id="book">
    <div class="spage" id="sp-left"></div>
    <div class="spage" id="sp-right"></div>
    <div id="leaf">
      <div id="leaf-front"></div>
      <div id="leaf-back"><div id="leaf-back-inner"></div></div>
    </div>
    <div id="spine"></div>
    <div id="hz-right"></div>
    <div id="hz-left"></div>
  </div>
</div>

<div id="nav">
  <button class="nb" id="bp" disabled>←</button>
  <span id="ctr">portada</span>
  <button class="nb" id="bn">→</button>
</div>
<button id="btn-close">✕ &nbsp;salir</button>
<div id="kh">← → navegar · esc cerrar</div>

<script>
(function(){
'use strict';

/* ── IMÁGENES ── */
var IMGS = [
  {src:'https://raw.githubusercontent.com/edsoncanaled/extractos/main/img/ejemplo2.JPG',a:'DÍAS',b:'POR DELANTE'},
  {src:'https://raw.githubusercontent.com/edsoncanaled/extractos/main/img/ejemplo3.png',a:'LUZ',b:'OBLICUA'},
];
var LABELS = [
  {a:'DÍAS',b:'POR DELANTE'},{a:'LUZ',b:'OBLICUA'},{a:'VIENTO',b:'SUR'},
  {a:'MARZO',b:'TARDE'},{a:'SILENCIO',b:'FORMA'},{a:'ARENA',b:'BLANCA'},
  {a:'SOMBRA',b:'LARGA'},{a:'RÍO',b:'ABAJO'},{a:'TIERRA',b:'ADENTRO'},
  {a:'NOCHE',b:'ABIERTA'},{a:'CAMPO',b:'VACÍO'},{a:'AGUA',b:'QUIETA'},
  {a:'PIEDRA',b:'GRIS'},{a:'CIELO',b:'BAJO'},{a:'FIN',b:'DE SERIE'},
];
var N = 15;
var FTOTAL = Math.ceil((N+1)/2);

/* ── ELEMENTS ── */
var book    = document.getElementById('book');
var spL     = document.getElementById('sp-left');
var spR     = document.getElementById('sp-right');
var leaf    = document.getElementById('leaf');
var lFront  = document.getElementById('leaf-front');
var lBackIn = document.getElementById('leaf-back-inner');
var spineEl = document.getElementById('spine');
var hzR     = document.getElementById('hz-right');
var hzL     = document.getElementById('hz-left');

/* ── SIZING ── */
var mob = function(){ return window.innerWidth <= 680; };
var PW=0, PH=0;
function calcSize(){
  var vw=window.innerWidth, vh=window.innerHeight;
  if(mob()){
    PH = Math.round(vh*.76);
    PW = Math.min(Math.round(PH*.70), Math.round(vw*.88));
  } else {
    PH = Math.min(Math.round(vh*.82),720);
    PW = Math.min(Math.round(PH*.70), Math.round(vw*.40), 500);
  }
}
calcSize();

/* ── STATE ── */
var cur=0, opened=false, flipping=false, flipTimer=null;
var FLIP_MS = 460;

/* ── LAYOUT ── */
function layout(animateWidth){
  var m  = mob();
  var bw = (cur===0 && !opened) ? PW : PW*2;

  book.style.width  = bw+'px';
  book.style.height = PH+'px';
  book.style.transition = animateWidth
    ? 'width 460ms cubic-bezier(.645,.045,.355,1)'
    : 'width 0ms';

  var showL = !m && opened;

  /* left static page */
  spL.style.display = showL ? 'block' : 'none';
  spL.style.width   = PW+'px';
  spL.style.height  = PH+'px';
  spL.style.left    = '0';

  /* right static page */
  spR.style.width  = PW+'px';
  spR.style.height = PH+'px';
  spR.style.right  = '0';
  spR.style.left   = 'auto';

  /* leaf size (always PW wide) */
  leaf.style.width  = PW+'px';
  leaf.style.height = PH+'px';

  /* spine */
  var sw = (showL && !m) ? 14 : 0;
  spineEl.style.left   = showL ? (PW-sw/2)+'px' : '-100px';
  spineEl.style.width  = sw+'px';
  spineEl.style.height = PH+'px';

  /* hot zones */
  hzR.style.width=PW+'px'; hzR.style.height=PH+'px';
  hzR.style.right='0'; hzR.style.top='0';
  hzL.style.width=(showL?PW:0)+'px'; hzL.style.height=PH+'px';
  hzL.style.left='0'; hzL.style.top='0';
}
layout(false);

/* ── HTML BUILDERS ── */
function coverHTML(){
  var s=IMGS[0]?IMGS[0].src:null;
  return '<div class="cover">'
    +(s?'<img src="'+s+'" alt="portada" loading="eager">'
       :'<div style="position:absolute;inset:0;background:#b0aca3"></div>')
    +'<div class="veil"></div><div class="bdr"></div>'
    +'<div class="info">'
    +'<p class="cv-ey">Edición I · 2025</p>'
    +'<h2 class="cv-t">Extractos</h2>'
    +'<div class="cv-r"></div>'
    +'<p class="cv-s">Colección Visual</p>'
    +'</div>'
    +'<span class="yr">© 2025</span>'
    +'</div>';
}
function bcovHTML(){
  return '<div class="bcov"><em>extractos</em></div>';
}
function pageHTML(idx){
  idx=Math.max(0,Math.min(idx,N+1));
  if(idx===0) return coverHTML();
  if(idx>N)   return bcovHTML();
  var d=IMGS[idx-1]||null;
  var lbl=LABELS[idx-1]||{a:'—',b:'—'};
  var n=('0'+idx).slice(-2);
  var a=(d&&d.a)||lbl.a, b=(d&&d.b)||lbl.b;
  var isL=idx%2===1;
  if(d&&d.src){
    return '<div class="pg">'
      +'<img class="bg" src="'+d.src+'" alt="'+a+'" loading="lazy">'
      +'<div class="shade"></div>'
      +'<span class="la">'+a+'</span><span class="lb">'+b+'</span>'
      +'<span class="ln '+(isL?'l':'r')+'">'+n+'</span>'
      +'</div>';
  }
  return '<div class="pg empty">'
    +'<div class="mid"><span>imagen '+n+'</span></div>'
    +'<span class="la">'+a+'</span><span class="lb">'+b+'</span>'
    +'<span class="ln '+(isL?'l':'r')+'">'+n+'</span>'
    +'</div>';
}

/* ── STATIC PAGES ── */
function refreshStatic(){
  var m=mob();
  if(cur===0){
    if(!m) spL.innerHTML=bcovHTML();
    spR.innerHTML=coverHTML();
  } else if(cur>=FTOTAL){
    if(!m) spL.innerHTML=pageHTML(N);
    spR.innerHTML=pageHTML(N+1);
  } else {
    var li=(cur-1)*2+1, ri=cur*2;
    if(!m) spL.innerHTML=pageHTML(Math.min(li,N+1));
    spR.innerHTML=pageHTML(Math.min(ri,N+1));
  }
}

/* ── FLIP ENGINE ──────────────────────────────
   dir=1  forward:  leaf at right, rotates 0 → -180
   dir=-1 backward: leaf at left,  rotates -180 → 0

   The leaf's LEFT EDGE is always the pivot.
   On desktop the pivot is at the spine (center of book).
   On mobile the pivot is the left edge of the single page.

   forward:  leaf.left = spine (PW on desktop, 0 on mobile)
   backward: leaf.left = 0     (left edge of left page or single page)
             but we set transform-origin to RIGHT so it pivots from right.
   ─────────────────────────────────────────────── */
function doFlip(dir, frontIdx, backIdx, openingCover){
  if(flipping) return;
  flipping = true;

  FLIP_MS = mob() ? 400 : 460;

  /* fill faces */
  lFront.innerHTML  = pageHTML(frontIdx);
  lBackIn.innerHTML = pageHTML(backIdx);

  /* position leaf and set starting transform */
  if(dir === 1){
    /* Forward: leaf starts on the right half, pivot=left edge of leaf = spine */
    leaf.style.transformOrigin = 'left center';
    if(mob()){
      leaf.style.left = '0';
    } else {
      leaf.style.left = (opened ? PW : 0)+'px';
    }
    /* start: flat (face showing) */
    leaf.style.transition = 'none';
    leaf.style.transform  = 'rotateY(0deg)';
  } else {
    /* Backward: leaf starts on the left half, pivot=right edge = spine */
    leaf.style.transformOrigin = 'right center';
    if(mob()){
      leaf.style.left = '0';
    } else {
      leaf.style.left = '0';
    }
    leaf.style.transition = 'none';
    leaf.style.transform  = 'rotateY(0deg)';
  }

  leaf.style.display = 'block';

  /* expand book if opening cover */
  if(openingCover){
    opened = true;
    layout(true);
  }

  /* force reflow then animate */
  leaf.getBoundingClientRect();

  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      leaf.style.transition = 'transform '+FLIP_MS+'ms cubic-bezier(.645,.045,.355,1)';
      if(dir === 1){
        leaf.style.transform = 'rotateY(-180deg)';
      } else {
        leaf.style.transform = 'rotateY(180deg)';
      }
    });
  });

  if(flipTimer) clearTimeout(flipTimer);
  flipTimer = setTimeout(function(){
    leaf.style.display    = 'none';
    leaf.style.transition = 'none';
    flipping  = false;
    flipTimer = null;
    /* if going back to cover, shrink book */
    if(cur===0){
      opened = false;
      layout(true);
    } else {
      layout(false);
    }
    refreshStatic();
    setNav();
  }, FLIP_MS+40);
}

/* ── NAVIGATION ── */
function next(){
  if(flipping||cur>=FTOTAL) return;
  var fi, bi;
  if(cur===0){
    fi=0; bi=1;
    cur++; setNav();
    doFlip(1,fi,bi,true);
  } else {
    fi=Math.min(cur*2,N+1);
    bi=Math.min(cur*2+1,N+1);
    cur++; setNav();
    doFlip(1,fi,bi,false);
  }
}
function prev(){
  if(flipping||cur<=0) return;
  var fi,bi;
  if(cur===1){
    fi=1; bi=0;
    cur--; setNav();
    doFlip(-1,fi,bi,false);
  } else {
    fi=Math.min((cur-1)*2,N+1);
    bi=Math.min((cur-1)*2+1,N+1);
    cur--; setNav();
    doFlip(-1,fi,bi,false);
  }
}
function setNav(){
  document.getElementById('bp').disabled=cur<=0;
  document.getElementById('bn').disabled=cur>=FTOTAL;
  var el=document.getElementById('ctr');
  if(cur===0){el.textContent='portada';return;}
  if(cur>=FTOTAL){el.textContent='fin';return;}
  var l=cur*2-1,r=cur*2;
  el.textContent=('0'+l).slice(-2)+' · '+(r<=N?('0'+r).slice(-2):'—');
}

/* ── OPEN / CLOSE ── */
function openBook(){
  document.getElementById('intro').classList.add('gone');
  ['stage','nav','btn-close','kh'].forEach(function(id){
    document.getElementById(id).classList.add('on');
  });
  cur=0; opened=false;
  leaf.style.display='none';
  layout(false); refreshStatic(); setNav();
}
function closeBook(){
  if(flipTimer){clearTimeout(flipTimer);flipTimer=null;}
  flipping=false;
  ['stage','nav','btn-close','kh'].forEach(function(id){
    document.getElementById(id).classList.remove('on');
  });
  setTimeout(function(){
    cur=0; opened=false;
    leaf.style.display='none';
    layout(false); refreshStatic(); setNav();
    document.getElementById('intro').classList.remove('gone');
  },600);
}

/* ── EVENTS ── */
document.getElementById('btn-open').addEventListener('click',openBook);
document.getElementById('btn-close').addEventListener('click',closeBook);
document.getElementById('bp').addEventListener('click',prev);
document.getElementById('bn').addEventListener('click',next);
hzR.addEventListener('click',function(e){e.stopPropagation();next();});
hzL.addEventListener('click',function(e){e.stopPropagation();prev();});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  else if(e.key==='Escape') closeBook();
});

var tx=0,ty=0;
document.addEventListener('touchstart',function(e){
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  var dy=e.changedTouches[0].clientY-ty;
