<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Extractos</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#09080a;--paper:#edeade}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--black);
  font-family:'IBM Plex Mono',monospace;
  -webkit-user-select:none;user-select:none;
  touch-action:none;
}

/* grain overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  opacity:.16;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── INTRO ── */
#intro{
  position:fixed;inset:0;background:var(--black);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:800;
  transition:opacity .8s,visibility .8s;
}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none}
.i-ey{font-size:8px;font-weight:300;letter-spacing:6px;text-transform:uppercase;
  color:#383838;opacity:0;animation:up .7s .3s forwards}
.i-title{
  font-family:'EB Garamond',serif;
  font-size:clamp(54px,10vw,106px);font-style:italic;
  color:#edeade;line-height:1;margin:10px 0 4px;letter-spacing:-2px;
  opacity:0;animation:up .8s .6s forwards;
}
.i-rule{width:0;height:.5px;background:#222;margin:22px auto;animation:widen .5s 1s forwards}
.i-sub{font-size:8px;font-weight:300;letter-spacing:5px;text-transform:uppercase;
  color:#2c2c2c;opacity:0;animation:up .6s 1.2s forwards}
#btn-open{
  margin-top:44px;font-size:8px;letter-spacing:5px;text-transform:uppercase;
  color:var(--black);background:#edeade;border:none;cursor:pointer;padding:12px 38px;
  opacity:0;animation:up .5s 1.6s forwards;transition:background .2s,transform .12s;
}
#btn-open:hover{background:#ddd9d0;transform:translateY(-1px)}
#btn-open:active{transform:translateY(1px)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes widen{to{width:52px}}

/* ── STAGE ── */
#stage{
  position:fixed;inset:0;
  background:#e8e2d5;
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;
  transition:opacity .7s,visibility .7s;
}
#stage.on{opacity:1;visibility:visible}

/* ── BOOK SHADOW WRAPPER (no 3D here — iOS safe) ── */
#book-wrap{
  position:relative;
  border-radius:2px;
  box-shadow:
    0 2px   6px  rgba(0,0,0,.12),
    0 10px  24px rgba(0,0,0,.18),
    0 32px  60px rgba(0,0,0,.22),
    0 70px 100px rgba(0,0,0,.18);
}

/* ── BOOK (3D context, no filter/shadow here) ── */
#book{
  position:relative;
  border-radius:2px;
  perspective:1800px;
  overflow:hidden;
}

/* ── PAGES ── */
.pg-slot{
  position:absolute;top:0;overflow:hidden;background:var(--paper);
}
#pg-a{left:0;border-radius:2px 0 0 2px}   /* left page (desktop) or only page */
#pg-b{right:0;border-radius:0 2px 2px 0}  /* right page (desktop only) */

/* spine */
#spine{
  position:absolute;top:0;z-index:15;pointer-events:none;
  background:linear-gradient(to right,
    rgba(0,0,0,.08) 0%,rgba(0,0,0,.48) 35%,
    rgba(0,0,0,.66) 50%,rgba(0,0,0,.44) 65%,rgba(0,0,0,.08) 100%);
}

/* ── FLIP LEAF — rotateY 3D ── */
#leaf{
  position:absolute;top:0;z-index:20;pointer-events:none;display:none;
  transform-style:preserve-3d;
}
#lf,#lb{
  position:absolute;inset:0;overflow:hidden;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}
#lb{ transform:rotateY(180deg); }

/* fold shadow — darkens near the spine as page curls */
#lf::after{
  content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
  background:linear-gradient(to left, rgba(0,0,0,0) 60%, rgba(0,0,0,.28) 100%);
  opacity:0;transition:opacity .15s;
}
#lf.sh::after{ opacity:1; }
#lb::after{
  content:'';position:absolute;inset:0;z-index:5;pointer-events:none;
  background:linear-gradient(to right, rgba(0,0,0,.22) 0%, rgba(0,0,0,0) 55%);
  opacity:0;transition:opacity .15s;
}
#lb.sh::after{ opacity:1; }

/* click zones */
#hz-r,#hz-l{position:absolute;top:0;z-index:30;cursor:pointer}
#hz-r{right:0} #hz-l{left:0}

/* ════════════════════════
   PAGE CONTENT STYLES
   ════════════════════════ */
.pc{position:relative;width:100%;height:100%;overflow:hidden;background:var(--paper)}
.pc img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.pc .sh{
  position:absolute;inset:0;z-index:2;
  background:linear-gradient(to bottom,rgba(0,0,0,0) 55%,rgba(0,0,0,.64) 100%);
}
.pc .la,.pc .lb{
  position:absolute;bottom:42px;z-index:3;
  font-size:7.5px;font-weight:300;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.88);
}
.pc .la{left:22px} .pc .lb{right:22px}
.pc .ln{
  position:absolute;bottom:24px;z-index:3;
  font-size:7px;font-weight:300;letter-spacing:2px;color:rgba(255,255,255,.28);
}
.pc .ln.l{left:22px} .pc .ln.r{right:22px}

/* empty page */
.pc.emp{background:var(--paper)}
.pc.emp::before{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(to bottom,
    transparent,transparent 27px,rgba(0,0,0,.030) 27px,rgba(0,0,0,.030) 28px);
}
.pc.emp .la,.pc.emp .lb{color:#3a3a3a}
.pc.emp .ln{color:#aaa}
.pc.emp .mid{
  position:absolute;top:50%;left:10%;right:10%;transform:translateY(-50%);
  border-top:.5px dashed #cdc9c0;border-bottom:.5px dashed #cdc9c0;
  height:28%;display:flex;align-items:center;justify-content:center;
}
.pc.emp .mid span{font-size:7px;letter-spacing:4px;color:#c4bfb6;text-transform:uppercase}

/* cover */
.cov{position:relative;width:100%;height:100%;overflow:hidden}
.cov img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.cov .vl{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(to bottom,rgba(0,0,0,.28) 0%,rgba(0,0,0,0) 40%,rgba(0,0,0,0) 58%,rgba(0,0,0,.46) 100%);
}
.cov .bd{position:absolute;inset:16px;border:.5px solid rgba(237,234,222,.17);z-index:2}
.cov .tx{
  position:absolute;inset:0;z-index:3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.cey{font-size:7.5px;font-weight:300;letter-spacing:5px;text-transform:uppercase;
  color:rgba(237,234,222,.42);margin-bottom:14px}
.ct{
  font-family:'EB Garamond',serif;font-style:italic;font-size:clamp(30px,6.5vw,58px);
  color:rgba(237,234,222,.93);text-shadow:0 2px 20px rgba(0,0,0,.5);
  line-height:1;letter-spacing:-1px;
}
.cr{width:24px;height:.5px;background:rgba(237,234,222,.24);margin:14px auto}
.cs{font-size:7px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:rgba(237,234,222,.26)}
.cov .yr{position:absolute;bottom:26px;right:24px;z-index:3;
  font-size:7px;letter-spacing:2px;color:rgba(237,234,222,.20)}

/* back cover */
.bcov{
  position:relative;width:100%;height:100%;background:var(--paper);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.bcov::before{content:'';position:absolute;inset:18px;border:.5px solid #d0ccc3;z-index:1}
.bcov::after{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(to bottom,
    transparent,transparent 27px,rgba(0,0,0,.026) 27px,rgba(0,0,0,.026) 28px);
}
.bcov em{
  font-family:'EB Garamond',serif;font-style:italic;
  font-size:20px;color:#bbb;letter-spacing:6px;position:relative;z-index:2;
}

/* ── NAV ── */
#nav{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:20px;z-index:500;
  opacity:0;visibility:hidden;transition:opacity .5s .3s,visibility .5s .3s;
}
#nav.on{opacity:1;visibility:visible}
.nb{
  width:44px;height:44px;
  background:rgba(0,0,0,.06);
  border:.5px solid rgba(0,0,0,.18);color:rgba(0,0,0,.45);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:border-color .15s,color .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;border-radius:1px;
}
.nb:hover:not(:disabled){border-color:rgba(0,0,0,.35);color:rgba(0,0,0,.7);transform:scale(1.04)}
.nb:active:not(:disabled){transform:scale(.88)}
.nb:disabled{opacity:.18;cursor:not-allowed}
#ctr{font-size:7px;letter-spacing:3px;color:rgba(0,0,0,.35);min-width:68px;text-align:center;text-transform:uppercase}

#btn-close{
  position:fixed;top:22px;right:22px;
  font-size:7px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(0,0,0,.30);background:none;border:none;cursor:pointer;
  z-index:500;padding:10px;
  opacity:0;visibility:hidden;
  transition:opacity .4s .3s,visibility .4s .3s,color .2s;
  -webkit-tap-highlight-color:transparent;
}
#btn-close.on{opacity:1;visibility:visible}
#btn-close:hover{color:rgba(0,0,0,.6)}

#kh{
  position:fixed;top:26px;left:50%;transform:translateX(-50%);
  font-size:6.5px;letter-spacing:3px;color:rgba(0,0,0,.22);text-transform:uppercase;
  white-space:nowrap;z-index:500;
  opacity:0;visibility:hidden;transition:opacity .4s .5s,visibility .4s .5s;
}
#kh.on{opacity:1;visibility:visible}
@media(max-width:680px){#kh{display:none}}
</style>
</head>
<body>

<div id="intro">
  <p class="i-ey">Edición I · 2025</p>
  <h1 class="i-title">Extractos</h1>
  <div class="i-rule"></div>
  <p class="i-sub">Una colección visual</p>
  <button id="btn-open">Abrir</button>
</div>

<div id="stage">
  <div id="book-wrap">
    <div id="book">
      <div class="pg-slot" id="pg-a"></div>
      <div class="pg-slot" id="pg-b"></div>
      <div id="leaf"><div id="lf"></div><div id="lb"></div></div>
      <div id="spine"></div>
      <div id="hz-r"></div>
      <div id="hz-l"></div>
    </div>
  </div>
</div>

<div id="nav">
  <button class="nb" id="bp" disabled>←</button>
  <span id="ctr">01</span>
  <button class="nb" id="bn">→</button>
</div>
<button id="btn-close">✕ &nbsp;salir</button>
<div id="kh">← → navegar · esc cerrar</div>

<script>
(function(){
'use strict';

/* ════════════════════
   TUS IMÁGENES
   ════════════════════ */
var IMGS = [
  {src:'https://raw.githubusercontent.com/edsoncanaled/extractos/main/img/ejemplo2.JPG',a:'DÍAS',b:'POR DELANTE'},
  {src:'https://raw.githubusercontent.com/edsoncanaled/extractos/main/img/ejemplo3.png',a:'LUZ',b:'OBLICUA'},
];
var LABELS=[
  {a:'DÍAS',b:'POR DELANTE'},{a:'LUZ',b:'OBLICUA'},{a:'VIENTO',b:'SUR'},
  {a:'MARZO',b:'TARDE'},{a:'SILENCIO',b:'FORMA'},{a:'ARENA',b:'BLANCA'},
  {a:'SOMBRA',b:'LARGA'},{a:'RÍO',b:'ABAJO'},{a:'TIERRA',b:'ADENTRO'},
  {a:'NOCHE',b:'ABIERTA'},{a:'CAMPO',b:'VACÍO'},{a:'AGUA',b:'QUIETA'},
  {a:'PIEDRA',b:'GRIS'},{a:'CIELO',b:'BAJO'},{a:'FIN',b:'DE SERIE'},
];

/*
  PAGE INDEX SYSTEM
  0           = cover
  1 .. N      = content pages
  N+1         = back cover

  MOBILE  — shows 1 page at a time: cur goes 0,1,2,...,N+1
  DESKTOP — shows 2 pages (spread): cur = spread index
            spread 0 = cover alone (left blank, right=cover)
            spread 1 = pages 1+2
            spread 2 = pages 3+4  ... etc.
            spread LAST = back cover
*/
var N = 15;

/* ════════════════════
   ELEMENTS
   ════════════════════ */
var book   = document.getElementById('book');
var bookWrap = document.getElementById('book-wrap');
var pgA    = document.getElementById('pg-a');
var pgB    = document.getElementById('pg-b');
var leaf   = document.getElementById('leaf');
var lf     = document.getElementById('lf');
var lb     = document.getElementById('lb');
var spineEl= document.getElementById('spine');
var hzR    = document.getElementById('hz-r');
var hzL    = document.getElementById('hz-l');

/* ════════════════════
   SIZING
   ════════════════════ */
var mob = function(){ return window.innerWidth <= 680; };
var PW=0, PH=0;

function calcSize(){
  var vw=window.innerWidth, vh=window.innerHeight;
  if(mob()){
    /* Single page. Leave ~130px for nav + safe area. */
    PH = Math.min(Math.round(vh - 130), Math.round(vh * 0.74));
    PW = Math.min(Math.round(PH * 0.68), Math.round(vw * 0.88));
  } else {
    PH = Math.min(Math.round(vh * 0.82), 720);
    PW = Math.min(Math.round(PH * 0.68), Math.round(vw * 0.40), 490);
  }
}
calcSize();

/* ════════════════════
   STATE
   ════════════════════ */
var cur = 0;          // page index (mob) or spread index (desktop)
var flipping = false;
var flipTimer = null;

function totalPages(){ return N + 2; }        // 0..N+1
function totalSpreads(){ return Math.ceil((N+2)/2); } // cover + spreads + back

function maxCur(){ return mob() ? N+1 : totalSpreads()-1; }

/* ════════════════════
   LAYOUT
   ════════════════════ */
function layout(){
  var m = mob();
  var bw = m ? PW : PW*2;

  book.style.width  = bw+'px';
  book.style.height = PH+'px';
  bookWrap.style.width  = bw+'px';
  bookWrap.style.height = PH+'px';

  /* page A = left on desktop, only page on mobile */
  pgA.style.width  = PW+'px';
  pgA.style.height = PH+'px';
  pgA.style.left   = '0';
  pgA.style.display= m ? 'none' : 'block'; /* hidden on mobile, pgB is the single page */

  /* page B = right on desktop, single on mobile */
  pgB.style.width  = PW+'px';
  pgB.style.height = PH+'px';
  pgB.style.right  = '0';
  pgB.style.left   = 'auto';

  /* leaf covers one page width */
  leaf.style.width  = PW+'px';
  leaf.style.height = PH+'px';

  /* spine only on desktop */
  var sw = m ? 0 : 14;
  spineEl.style.left   = m ? '-100px' : (PW - sw/2)+'px';
  spineEl.style.width  = sw+'px';
  spineEl.style.height = PH+'px';

  /* click zones */
  hzR.style.width  = PW+'px'; hzR.style.height=PH+'px';
  hzR.style.right  = '0'; hzR.style.top='0';
  hzL.style.width  = m?'0':PW+'px'; hzL.style.height=PH+'px';
  hzL.style.left   = '0'; hzL.style.top='0';
}
layout();

/* ════════════════════
   PAGE HTML
   ════════════════════ */
function coverHTML(){
  var s=IMGS[0]?IMGS[0].src:null;
  return '<div class="cov">'
    +(s?'<img src="'+s+'" alt="portada" loading="eager">'
       :'<div style="position:absolute;inset:0;background:#b0aca3"></div>')
    +'<div class="vl"></div><div class="bd"></div>'
    +'<div class="tx">'
    +'<p class="cey">Edición I · 2025</p>'
    +'<h2 class="ct">Extractos</h2>'
    +'<div class="cr"></div>'
    +'<p class="cs">Colección Visual</p>'
    +'</div><span class="yr">© 2025</span></div>';
}
function bcovHTML(){
  return '<div class="bcov"><em>extractos</em></div>';
}
function contentHTML(idx){
  /* idx: 1..N */
  var d=IMGS[idx-1]||null;
  var lbl=LABELS[idx-1]||{a:'—',b:'—'};
  var n=('0'+idx).slice(-2);
  var a=(d&&d.a)||lbl.a, b=(d&&d.b)||lbl.b;
  var isL=idx%2===1;
  if(d&&d.src){
    return '<div class="pc">'
      +'<img src="'+d.src+'" alt="'+a+'" loading="lazy">'
      +'<div class="sh"></div>'
      +'<span class="la">'+a+'</span><span class="lb">'+b+'</span>'
      +'<span class="ln '+(isL?'l':'r')+'">'+n+'</span>'
      +'</div>';
  }
  return '<div class="pc emp">'
    +'<div class="mid"><span>imagen '+n+'</span></div>'
    +'<span class="la">'+a+'</span><span class="lb">'+b+'</span>'
    +'<span class="ln '+(isL?'l':'r')+'">'+n+'</span>'
    +'</div>';
}
function pageHTML(idx){
  if(idx<0||idx>N+1) return '<div class="pc emp"></div>';
  if(idx===0)   return coverHTML();
  if(idx===N+1) return bcovHTML();
  return contentHTML(idx);
}

/* ════════════════════════════════════
   WHICH PAGES TO SHOW
   ════════════════════════════════════
   Mobile:  pgB = page[cur], pgA hidden
   Desktop: spread[cur] → pgA=left, pgB=right
            spread 0: pgA=back-cover(hidden), pgB=cover
            spread k: pgA=page[2k-1], pgB=page[2k]
            last spread: pgA=page[N], pgB=page[N+1]
   ════════════════════════════════════ */
function spreadPages(s){
  /* returns {left, right} page indices for spread s */
  if(s===0) return {left:-1, right:0};
  var l=s*2-1, r=s*2;
  return {left:Math.min(l,N+1), right:Math.min(r,N+1)};
}

function refreshStatic(){
  var m=mob();
  if(m){
    pgB.innerHTML = pageHTML(cur);
    pgA.innerHTML = '';
  } else {
    var p=spreadPages(cur);
    pgA.innerHTML = p.left>=0 ? pageHTML(p.left) : '<div class="pc emp"></div>';
    pgB.innerHTML = pageHTML(p.right);
  }
}

/* ════════════════════════════════════
   FLIP
   ════════════════════════════════════
   frontIdx: page leaving
   backIdx:  page arriving
   side: 'right' (leaf on right half) or 'left' (leaf on left half)
   ════════════════════════════════════ */
function doFlip(frontIdx, backIdx, side, onStart){
  if(flipping) return;
  flipping=true;

  var ms = mob() ? 460 : 520;
  var ease = 'cubic-bezier(.4,0,.2,1)';

  lf.innerHTML = pageHTML(frontIdx);
  lb.innerHTML = pageHTML(backIdx);
  lf.className=''; lb.className='';

  /* pivot at spine edge */
  if(side==='right'){
    leaf.style.left = mob() ? '0' : PW+'px';
    leaf.style.transformOrigin = 'left center';
  } else {
    leaf.style.left = '0';
    leaf.style.transformOrigin = 'right center';
  }

  /* start: front face showing (0deg), back face hidden (rotated away) */
  leaf.style.transition = 'none';
  leaf.style.transform  = 'rotateY(0deg)';
  lf.style.display = '';
  lb.style.display = '';
  leaf.style.display = 'block';
  lf.classList.add('sh');

  /* force reflow */
  leaf.getBoundingClientRect();

  /* Update static pages NOW while the leaf covers them — no flash */
  if(onStart) onStart();

  /* animate: rotate to -180 (forward) or +180 (backward) */
  var target = side === 'right' ? 'rotateY(-180deg)' : 'rotateY(180deg)';
  leaf.style.transition = 'transform ' + ms + 'ms ' + ease;
  leaf.style.transform  = target;

  /* shadow: peak at midpoint then fade */
  setTimeout(function(){
    if(!flipping) return;
    lf.classList.remove('sh');
    lb.classList.add('sh');
  }, ms * 0.48);
  setTimeout(function(){
    if(!flipping) return;
    lb.classList.remove('sh');
  }, ms * 0.82);

  /* finish — no DOM changes here, pages already updated */
  if(flipTimer) clearTimeout(flipTimer);
  flipTimer = setTimeout(function(){
    leaf.style.display = 'none';
    leaf.style.transition = 'none';
    flipping = false; flipTimer = null;
    setNav();
  }, ms + 20);
}

/* ════════════════════
   NAVIGATION
   ════════════════════ */
function next(){
  if(flipping||cur>=maxCur()) return;
  var m=mob();

  if(m){
    var fi=cur, bi=cur+1;
    cur++;
    setNav();
    doFlip(fi, bi, 'right', function(){
      pgB.innerHTML = pageHTML(bi);
    });
  } else {
    var p=spreadPages(cur);
    var np=spreadPages(cur+1);
    cur++;
    setNav();
    doFlip(p.right, np.right, 'right', function(){
      /* static pages updated while leaf covers them */
      pgA.innerHTML = np.left>=0 ? pageHTML(np.left) : '<div class="pc emp"></div>';
      pgB.innerHTML = pageHTML(np.right);
    });
  }
}

function prev(){
  if(flipping||cur<=0) return;
  var m=mob();

  if(m){
    var fi=cur, bi=cur-1;
    cur--;
    setNav();
    doFlip(fi, bi, 'left', function(){
      pgB.innerHTML = pageHTML(bi);
    });
  } else {
    var p2=spreadPages(cur);
    var pp=spreadPages(cur-1);
    cur--;
    setNav();
    doFlip(p2.left>=0?p2.left:0, pp.left>=0?pp.left:0, 'left', function(){
      pgA.innerHTML = pp.left>=0 ? pageHTML(pp.left) : '<div class="pc emp"></div>';
      pgB.innerHTML = pageHTML(pp.right);
    });
  }
}

function setNav(){
  document.getElementById('bp').disabled=cur<=0;
  document.getElementById('bn').disabled=cur>=maxCur();
  var el=document.getElementById('ctr');
  var m=mob();
  if(m){
    if(cur===0) el.textContent='portada';
    else if(cur===N+1) el.textContent='fin';
    else el.textContent=('0'+cur).slice(-2);
  } else {
    if(cur===0) el.textContent='portada';
    else if(cur>=totalSpreads()-1) el.textContent='fin';
    else{
      var p=spreadPages(cur);
      var l=('0'+p.left).slice(-2), r=('0'+p.right).slice(-2);
      el.textContent=l+' · '+r;
    }
  }
}

/* ════════════════════
   OPEN / CLOSE
   ════════════════════ */
function openBook(){
  document.getElementById('intro').classList.add('gone');
  ['stage','nav','btn-close','kh'].forEach(function(id){
    document.getElementById(id).classList.add('on');
  });
  cur=0; flipping=false;
  leaf.style.display='none';
  layout(); refreshStatic(); setNav();
}
function closeBook(){
  if(flipTimer){clearTimeout(flipTimer);flipTimer=null;}
  flipping=false;
  ['stage','nav','btn-close','kh'].forEach(function(id){
    document.getElementById(id).classList.remove('on');
  });
  setTimeout(function(){
    cur=0;
    leaf.style.display='none';
    layout(); refreshStatic(); setNav();
    document.getElementById('intro').classList.remove('gone');
  },650);
}

/* ════════════════════
   EVENTS
   ════════════════════ */
document.getElementById('btn-open').addEventListener('click',openBook);
document.getElementById('btn-close').addEventListener('click',closeBook);
document.getElementById('bp').addEventListener('click',prev);
document.getElementById('bn').addEventListener('click',next);
hzR.addEventListener('click',function(e){e.stopPropagation();next();});
hzL.addEventListener('click',function(e){e.stopPropagation();prev();});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  else if(e.key==='Escape') closeBook();
});

var tx=0,ty=0;
document.addEventListener('touchstart',function(e){
  tx=e.touches[0].clientX; ty=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  var dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>36) dx<0?next():prev();
},{passive:true});

window.addEventListener('resize',function(){
  calcSize(); layout(); refreshStatic(); setNav();
});

/* init */
leaf.style.display='none';
refreshStatic(); setNav();

})();
</script>
</body>
</html>
