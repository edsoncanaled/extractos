<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extractos</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #0c0b0b;
  --paper: #eeead f;
  --paper: #edeade;
  --dimtype: #aaa;
  --type: #181818;
  --W: 530px;
  --H: 720px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--black);
}

/* subtle grain */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.045'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999;
  mix-blend-mode: screen; opacity: 0.6;
}

/* ─── INTRO ─── */
#intro {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 600;
  background: var(--black);
  transition: opacity 0.9s ease, visibility 0.9s ease;
}
#intro.gone { opacity: 0; visibility: hidden; pointer-events: none; }

.i-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; font-weight: 300;
  letter-spacing: 6px; text-transform: uppercase;
  color: #3a3a3a;
  opacity: 0; animation: up 0.7s 0.5s forwards;
}
.i-title {
  font-family: 'EB Garamond', serif;
  font-size: clamp(72px, 11vw, 130px);
  font-weight: 400; font-style: italic;
  color: #edeade; line-height: 1;
  margin: 14px 0 6px;
  letter-spacing: -2px;
  opacity: 0; animation: up 0.8s 0.8s forwards;
}
.i-rule {
  width: 0; height: 0.5px;
  background: #2d2d2d; margin: 26px auto;
  animation: widen 0.5s 1.2s forwards;
}
.i-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; font-weight: 300;
  letter-spacing: 5px; text-transform: uppercase;
  color: #333;
  opacity: 0; animation: up 0.6s 1.4s forwards;
}
.i-btn {
  margin-top: 56px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--black); background: #edeade;
  border: none; cursor: pointer;
  padding: 12px 38px;
  opacity: 0; animation: up 0.6s 1.8s forwards;
  transition: background 0.2s, transform 0.15s;
}
.i-btn:hover { background: #ddd9d0; transform: translateY(-1px); }

@keyframes up {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes widen { from { width: 0; } to { width: 64px; } }

/* ─── STAGE ─── */
#stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  perspective: 3500px;
  opacity: 0; visibility: hidden;
  transition: opacity 0.7s 0.2s, visibility 0.7s 0.2s;
}
#stage.on { opacity: 1; visibility: visible; }

/* ─── BOOK ─── */
#book {
  position: relative;
  width: calc(var(--W) * 2);
  height: var(--H);
  transform-style: preserve-3d;
  transform: rotateX(4deg) rotateY(-2deg);
  transition: transform 0.8s ease;
  filter:
    drop-shadow(0 80px 140px rgba(0,0,0,0.95))
    drop-shadow(0 20px 40px rgba(0,0,0,0.7));
}
#stage:hover #book { transform: rotateX(1.5deg) rotateY(-0.5deg); }

/* spine crease */
#book::after {
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 3px;
  transform: translateX(-50%);
  background: linear-gradient(to right,
    rgba(0,0,0,0.5),
    rgba(0,0,0,0.1) 30%,
    rgba(0,0,0,0.1) 70%,
    rgba(0,0,0,0.5));
  z-index: 200; pointer-events: none;
}

/* ─── STATIC HALVES ─── */
.s-page {
  position: absolute; top: 0;
  width: var(--W); height: var(--H);
  background: #edeade;
  overflow: hidden;
}
#s-left  { left: 0; }
#s-right { right: 0; }

/* ─── FLIP PAGES ─── */
.fp {
  position: absolute;
  top: 0; left: var(--W);   /* sits on right half */
  width: var(--W); height: var(--H);
  transform-origin: left center;
  transform-style: preserve-3d;
  transition: transform 1.05s cubic-bezier(0.77,0,0.175,1);
  cursor: pointer;
}
.fp.flipped { transform: rotateY(-180deg); }

.fp-front, .fp-back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  background: #edeade;
  overflow: hidden;
}
.fp-back { transform: rotateY(180deg); }

/* edge shadow */
.fp-front::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0; width: 18px;
  background: linear-gradient(to right, transparent, rgba(0,0,0,0.06));
  z-index: 50; pointer-events: none;
}
.fp-back::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 18px;
  background: linear-gradient(to left, transparent, rgba(0,0,0,0.06));
  z-index: 50; pointer-events: none;
}

/* ─── PAGE INTERIOR ─── */
.pi {
  position: relative;
  width: 100%; height: 100%;
  background: #edeade;
}

/* Image strip centered, feathered edges */
.strip {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  left: 0; right: 0;
  height: 35%;
  overflow: hidden;
}
.strip img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  filter: grayscale(100%) contrast(1.08) brightness(0.97);
}
/* feather fade */
.strip::before, .strip::after {
  content: ''; position: absolute;
  top: 0; bottom: 0; width: 35%; z-index: 2;
}
.strip::before { left: 0; background: linear-gradient(to right, #edeade 0%, transparent 100%); }
.strip::after  { right: 0; background: linear-gradient(to left,  #edeade 0%, transparent 100%); }

/* top/bottom fade on strip */
.strip-inner {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 3;
  background:
    linear-gradient(to bottom, #edeade 0%, transparent 18%, transparent 82%, #edeade 100%);
}

/* placeholder strip */
.strip-ph {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  left: 8%; right: 8%;
  height: 33%;
  border-top: 0.5px dashed #ccc;
  border-bottom: 0.5px dashed #ccc;
  display: flex; align-items: center; justify-content: center;
}
.strip-ph span {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7px; letter-spacing: 4px;
  color: #ccc; text-transform: uppercase;
}

/* labels */
.lbl {
  position: absolute;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7.5px; font-weight: 300;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--type);
  line-height: 1;
}
/* centered on page */
.lbl-cl { top: 50%; left: 42%; transform: translate(-50%,-50%); }
.lbl-cr { top: 50%; right: 28px; transform: translateY(-50%); }

.lbl-num {
  position: absolute;
  bottom: 32px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7px; font-weight: 300;
  letter-spacing: 2px; color: #bbb;
}
.lbl-num.l { left: 30px; }
.lbl-num.r { right: 30px; }

/* ─── COVER ─── */
.cov {
  width: 100%; height: 100%;
  background: #edeade;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}
.cov::before {
  content: '';
  position: absolute; inset: 26px;
  border: 0.5px solid #d0ccc3;
}
.cov-ey {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7px; font-weight: 300;
  letter-spacing: 5px; text-transform: uppercase; color: #bbb;
  margin-bottom: 18px;
}
.cov-t {
  font-family: 'EB Garamond', serif;
  font-size: 58px; font-weight: 400; font-style: italic;
  color: var(--type); line-height: 0.95;
  text-align: center; letter-spacing: -1px;
}
.cov-r { width: 32px; height: 0.5px; background: #ccc; margin: 22px auto; }
.cov-s {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7px; font-weight: 300;
  letter-spacing: 5px; text-transform: uppercase; color: #bbb;
}
.cov-yr {
  position: absolute; bottom: 38px; right: 38px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7px; letter-spacing: 2px; color: #ccc;
}

/* ─── BACK COVER ─── */
.bcov {
  width: 100%; height: 100%;
  background: #edeade;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.bcov::before { content: ''; position: absolute; inset: 26px; border: 0.5px solid #d8d4cb; }
.bcov span {
  font-family: 'EB Garamond', serif;
  font-style: italic; font-size: 22px; color: #ccc; letter-spacing: 6px;
}

/* ─── NAV ─── */
#nav {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 28px;
  z-index: 300;
  opacity: 0; visibility: hidden;
  transition: opacity 0.5s 0.5s, visibility 0.5s 0.5s;
}
#nav.on { opacity: 1; visibility: visible; }

.nb {
  width: 34px; height: 34px;
  background: none; border: 0.5px solid #2a2a2a;
  color: #555; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-family: 'IBM Plex Mono', monospace;
  transition: border-color 0.2s, color 0.2s, transform 0.15s;
}
.nb:hover:not(:disabled) { border-color: #555; color: #aaa; transform: scale(1.06); }
.nb:disabled { opacity: 0.12; cursor: not-allowed; }

#ctr {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7.5px; letter-spacing: 3px;
  color: #333; min-width: 68px; text-align: center; text-transform: uppercase;
}

#xb {
  position: fixed; top: 26px; right: 30px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7.5px; letter-spacing: 4px; text-transform: uppercase;
  color: #2a2a2a; background: none; border: none; cursor: pointer;
  z-index: 300; opacity: 0; visibility: hidden;
  transition: opacity 0.4s 0.5s, visibility 0.4s 0.5s, color 0.2s;
}
#xb.on { opacity: 1; visibility: visible; }
#xb:hover { color: #666; }

#kh {
  position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7px; letter-spacing: 3px; color: #222;
  text-transform: uppercase; white-space: nowrap; z-index: 300;
  opacity: 0; visibility: hidden;
  transition: opacity 0.4s 0.7s, visibility 0.4s 0.7s;
}
#kh.on { opacity: 1; visibility: visible; }

/* ─── RESPONSIVE ─── */
@media (max-width: 1150px) {
  :root { --W: min(44vw, 500px); --H: min(60vw, 680px); }
}
@media (max-width: 780px) {
  :root { --W: 82vw; --H: 112vw; }
  #book { width: var(--W); }
  #s-left { display: none; }
  .fp { left: 0; transform-origin: right center; }
  .fp.flipped { transform: rotateY(180deg); }
  #book::after { display: none; }
}
</style>
</head>
<body>

<div id="intro">
  <p class="i-label">Edición I &nbsp;·&nbsp; 2025</p>
  <h1 class="i-title">Extractos</h1>
  <div class="i-rule"></div>
  <p class="i-sub">Una colección visual</p>
  <button class="i-btn" onclick="openBook()">Abrir</button>
</div>

<div id="stage">
  <div id="book">
    <div class="s-page" id="s-left"></div>
    <div class="s-page" id="s-right"></div>
  </div>
</div>

<div id="nav">
  <button class="nb" id="bp" onclick="prev()" disabled>←</button>
  <span id="ctr">portada</span>
  <button class="nb" id="bn" onclick="next()">→</button>
</div>
<button id="xb" onclick="closeBook()">✕ &nbsp;salir</button>
<div id="kh">← → navegar &nbsp;·&nbsp; esc cerrar</div>

<script>
/* ═══════════════════════════════════════════
   CONFIGURA TUS IMÁGENES AQUÍ
   Ejemplo con GitHub raw:
   src: 'https://raw.githubusercontent.com/edsoncanaled/extractos/main/img/foto01.JPG'

   "a" = etiqueta izquierda centrada
   "b" = etiqueta derecha centrada
═══════════════════════════════════════════ */
const IMGS = [
  // { src: 'https://raw.githubusercontent.com/edsoncanaled/extractos/main/img/foto01.JPG', a: 'DÍAS',    b: 'POR DELANTE' },
  // { src: '...foto02.JPG', a: 'LUZ',     b: 'OBLICUA'     },
  // { src: '...foto03.JPG', a: 'VIENTO',  b: 'SUR'         },
  // { src: '...foto04.JPG', a: 'MARZO',   b: 'TARDE'       },
  // { src: '...foto05.JPG', a: 'SILENCIO',b: 'FORMA'       },
  // { src: '...foto06.JPG', a: 'ARENA',   b: 'BLANCA'      },
  // { src: '...foto07.JPG', a: 'SOMBRA',  b: 'LARGA'       },
  // { src: '...foto08.JPG', a: 'RÍO',     b: 'ABAJO'       },
  // { src: '...foto09.JPG', a: 'TIERRA',  b: 'ADENTRO'     },
  // { src: '...foto10.JPG', a: 'NOCHE',   b: 'ABIERTA'     },
  // { src: '...foto11.JPG', a: 'CAMPO',   b: 'VACÍO'       },
  // { src: '...foto12.JPG', a: 'AGUA',    b: 'QUIETA'      },
  // { src: '...foto13.JPG', a: 'PIEDRA',  b: 'GRIS'        },
  // { src: '...foto14.JPG', a: 'CIELO',   b: 'BAJO'        },
  // { src: '...foto15.JPG', a: 'FIN',     b: 'DE SERIE'    },
];

const PH = [
  { a:'DÍAS',    b:'POR DELANTE'}, { a:'LUZ',     b:'OBLICUA'   },
  { a:'VIENTO',  b:'SUR'        }, { a:'MARZO',   b:'TARDE'     },
  { a:'SILENCIO',b:'FORMA'      }, { a:'ARENA',   b:'BLANCA'    },
  { a:'SOMBRA',  b:'LARGA'      }, { a:'RÍO',     b:'ABAJO'     },
  { a:'TIERRA',  b:'ADENTRO'    }, { a:'NOCHE',   b:'ABIERTA'   },
  { a:'CAMPO',   b:'VACÍO'      }, { a:'AGUA',    b:'QUIETA'    },
  { a:'PIEDRA',  b:'GRIS'       }, { a:'CIELO',   b:'BAJO'      },
  { a:'FIN',     b:'DE SERIE'   },
];

const N = 15;
const FLIP_TOTAL = Math.ceil((N + 1) / 2); // 8

/* ── HTML generators ── */
function pageHTML(idx) {
  if (idx === 0) return coverHTML();
  if (idx > N)   return bcovHTML();
  const d = IMGS[idx-1] || null;
  const p = PH[idx-1];
  const n = String(idx).padStart(2,'0');
  const a = (d && d.a) || p.a;
  const b = (d && d.b) || p.b;
  const isLeft = idx % 2 === 1; // odd = appears on left side after flip

  const imgBlock = d
    ? `<div class="strip">
         <img src="${d.src}" alt="${a}">
         <div class="strip-inner"></div>
       </div>`
    : `<div class="strip-ph"><span>imagen ${n}</span></div>`;

  return `<div class="pi">
    ${imgBlock}
    <span class="lbl lbl-cl">${a}</span>
    <span class="lbl lbl-cr">${b}</span>
    <span class="lbl-num ${isLeft ? 'l':'r'}">${n}</span>
  </div>`;
}

function coverHTML() {
  return `<div class="cov">
    <p class="cov-ey">Edición I &nbsp;·&nbsp; 2025</p>
    <h2 class="cov-t">Extractos</h2>
    <div class="cov-r"></div>
    <p class="cov-s">Colección visual</p>
    <span class="cov-yr">© 2025</span>
  </div>`;
}
function bcovHTML() {
  return `<div class="bcov"><span>extractos</span></div>`;
}

/* ── Build pages ── */
const book = document.getElementById('book');
const sL = document.getElementById('s-left');
const sR = document.getElementById('s-right');
const pages = [];

for (let i = 0; i < FLIP_TOTAL; i++) {
  const fIdx = i === 0 ? 0 : i * 2;   // front face index: 0,2,4,6,8,10,12,14
  const bIdx = i * 2 + 1;              // back face index:  1,3,5,7,9,11,13,15

  const pg = document.createElement('div');
  pg.className = 'fp';
  pg.style.zIndex = FLIP_TOTAL - i;

  const front = document.createElement('div');
  front.className = 'fp-front';
  front.innerHTML = pageHTML(fIdx);

  const back = document.createElement('div');
  back.className = 'fp-back';
  back.innerHTML = pageHTML(bIdx);

  pg.appendChild(front);
  pg.appendChild(back);
  book.appendChild(pg);
  pages.push({ el: pg, fIdx, bIdx });

  pg.addEventListener('click', () => { if (!pg.classList.contains('flipped')) next(); });
}

/* ── Static refresh ── */
function setStatic() {
  // Left static: back of last flipped, else back cover
  if (cur === 0) {
    sL.innerHTML = bcovHTML();
  } else {
    sL.innerHTML = pages[cur-1].el.querySelector('.fp-back').innerHTML;
  }
  // Right static: front of current top page, else back cover
  if (cur < FLIP_TOTAL) {
    sR.innerHTML = pages[cur].el.querySelector('.fp-front').innerHTML;
  } else {
    sR.innerHTML = bcovHTML();
  }
}

/* ── Nav refresh ── */
function setNav() {
  document.getElementById('bp').disabled = cur <= 0;
  document.getElementById('bn').disabled = cur >= FLIP_TOTAL;
  const el = document.getElementById('ctr');
  if (cur === 0) { el.textContent = 'portada'; return; }
  if (cur >= FLIP_TOTAL) { el.textContent = 'fin'; return; }
  const l = cur * 2 - 1;
  const r = cur * 2;
  el.textContent = `${String(l).padStart(2,'0')} · ${r <= N ? String(r).padStart(2,'0') : '—'}`;
}

/* ── State ── */
let cur = 0;

function next() {
  if (cur >= FLIP_TOTAL) return;
  const pg = pages[cur].el;
  pg.classList.add('flipped');
  cur++;
  setNav();
  setTimeout(setStatic, 520);
}

function prev() {
  if (cur <= 0) return;
  cur--;
  const pg = pages[cur].el;
  pg.classList.remove('flipped');
  setNav();
  setTimeout(setStatic, 1050);
}

/* ── Open/Close ── */
function openBook() {
  document.getElementById('intro').classList.add('gone');
  document.getElementById('stage').classList.add('on');
  document.getElementById('nav').classList.add('on');
  document.getElementById('xb').classList.add('on');
  document.getElementById('kh').classList.add('on');
  setStatic(); setNav();
}

function closeBook() {
  ['stage','nav','xb','kh'].forEach(id => document.getElementById(id).classList.remove('on'));
  setTimeout(() => {
    cur = 0;
    pages.forEach(p => p.el.classList.remove('flipped'));
    setStatic(); setNav();
    document.getElementById('intro').classList.remove('gone');
  }, 600);
}

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' ') next();
  else if (e.key==='ArrowLeft') prev();
  else if (e.key==='Escape') closeBook();
});

/* ── Touch ── */
let tx = 0;
document.addEventListener('touchstart', e => tx = e.touches[0].clientX, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 45) dx < 0 ? next() : prev();
}, {passive:true});

setStatic(); setNav();
</script>
</body>
</html>
